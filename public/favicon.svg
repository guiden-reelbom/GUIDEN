<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="compassGradUnified" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" />
      <stop offset="50%" stop-color="#F26B7A" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>
  
  <!-- Outer Markers - Dark Navy for contrast on light tabs -->
  <path d="M12 1.5l1.5 2.5h-3z" fill="#0F172A" />
  <path d="M12 22.5l-1.5-2.5h3z" fill="#0F172A" />
  <path d="M22.5 12l-2.5 1.5v-3z" fill="#0F172A" />
  <path d="M1.5 12l2.5-1.5v3z" fill="#0F172A" />

  <!-- Inner Circle -->
  <circle cx="12" cy="12" r="7.5" stroke="#0F172A" stroke-width="1.2" stroke-opacity="0.2" fill="none" />
  
  <!-- Needle Rhombus -->
  <g transform="rotate(45 12 12)">
    <path 
      d="M12 3l3.5 9-3.5 9-3.5-9z" 
      fill="url(#compassGradUnified)" 
      stroke="#0F172A" 
      stroke-width="0.3"
    />
    <!-- Reduced Center Hole -->
    <circle cx="12" cy="12" r="0.75" fill="white" />
  </g>
</svg>
