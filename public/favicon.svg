<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Original Brand Gradient Colors -->
    <linearGradient id="guidenOriginalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E27C62" />
      <stop offset="100%" stop-color="#9E5DAC" />
    </linearGradient>
  </defs>

  <!-- Deep Navy/Black Outlined Compass Frame for High Contrast on Light Tabs -->
  <!-- Outer N/S/E/W points -->
  <path d="M16 2l1.5 3h-3z" fill="#0F172A" />
  <path d="M16 30l-1.5-3h3z" fill="#0F172A" />
  <path d="M30 16l-3 1.5v-3z" fill="#0F172A" />
  <path d="M2 16l3-1.5v3z" fill="#0F172A" />

  <!-- Main Ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#0F172A" stroke-width="2.5" />
  
  <!-- Original Gradient Needle - Maximized Size -->
  <g transform="rotate(45 16 16)">
    <path 
      d="M16 3L23 16L16 29L9 16Z" 
      fill="url(#guidenOriginalGrad)"
    />
    <!-- Center white dot for precision look -->
    <circle cx="16" cy="16" r="2.5" fill="white" />
  </g>
</svg>
